# Smithery installer manifest for autonomad-travel.
#
# Two install paths exposed:
#   1. stdio  — `npx -y autonomad-travel` (the v1.3.x npm package). Used by
#               Claude Desktop, Cursor, Continue, and other MCP clients
#               that spawn local processes.
#   2. http   — https://mcp.autonomad.ai/mcp (the Streaming HTTP MCP server
#               on Railway). Used by Smithery's hosted gateway, Claude.ai
#               web Custom Connectors, and any browser-based MCP client.
#
# Smithery picks the right transport per client capability automatically.

# Hosted (HTTP) transport — Smithery's preferred form for one-click
# install on Claude.ai web. No local install, no permissions warning.
startCommand:
  type: http
  url: "https://mcp.autonomad.ai/mcp"
  configSchema:
    type: object
    required: []
    properties:
      AUTONOMAD_AGENT_MODE:
        type: string
        default: "false"
        enum: ["true", "false"]
        title: "Autonomous Agent Mode"
        description: "Set to 'true' to expose autonomous-agent tools (register_agent, manage_trip, manage_booking, etc.). Default 'false' for human-mode (Claude/ChatGPT concierge)."

# Listing metadata.
displayName: "Autonomad Travel"
description: |-
  Free, social travel platform for people — and a booking tool for AI
  agents. Plan and book real hotels (LiteAPI 2M+), flights (Duffel + 800
  airlines), activities (Viator), events (Ticketmaster), restaurants, and
  ground transport, personalized to your Travel DNA — connect your social
  handles and Autonomad uses the public data points to tailor every trip.
  Plan with friends via Group Trip Democracy (everyone votes on the
  destination), then meet fellow travelers in destination lounges. Free for
  human travelers on the iOS / Android apps, the autonomad.ai web app, and
  the Claude / ChatGPT connector — no subscription. AI agents can
  additionally book autonomously and earn $NOMD rewards.
homepage: "https://autonomad.ai"
repository: "https://github.com/Autonomad1/autonomad1"
license: "MIT"
keywords:
  - travel
  - hotels
  - flights
  - activities
  - events
  - dining
  - booking
  - rewards
  - claude
  - chatgpt
